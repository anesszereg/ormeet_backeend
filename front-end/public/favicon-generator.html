<!DOCTYPE html>
<html>
<head>
    <title>Favicon Generator</title>
</head>
<body>
    <h2>Ormeet Favicon Generator</h2>
    <p>This will generate favicon files from the SVG logo</p>
    <canvas id="canvas" width="512" height="512" style="border: 1px solid #ccc;"></canvas>
    <br><br>
    <button onclick="generateFavicons()">Generate Favicons</button>
    <div id="downloads"></div>

    <script>
        const svg = `<svg width="512" height="512" viewBox="0 0 28 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="512" height="512" fill="white"/>
            <g transform="translate(120, 100) scale(10)">
                <path d="M25.4823 3.2568C25.7624 3.32823 25.9092 3.6233 25.7967 3.88959C25.2384 5.21111 23.5009 8.82814 20.7293 10.151C18.1076 11.4024 14.4725 10.7095 13.1653 10.3949C12.8914 10.329 12.7413 10.0481 12.8379 9.78343C13.3077 8.49569 14.7842 4.97963 17.3331 3.56463C20.0268 2.06919 24.0679 2.8961 25.4823 3.2568Z" fill="#FF4000"/>
                <path d="M13.5989 13.4994C13.5989 13.4994 14.2563 11.4916 10.4009 8.98797C8.18338 7.54793 6.40802 7.57018 6.40802 7.57018" stroke="#FF4000" stroke-width="1.42267" stroke-linecap="round"/>
                <path d="M11.9843 13.0219C11.9843 13.0219 12.1858 11.9658 12.4951 11.3583C12.7888 10.7817 13.4749 10.0293 13.4749 10.0293" stroke="#FF4000" stroke-width="1.42267" stroke-linecap="round"/>
                <path d="M13.5527 10.8965C21.0379 10.8965 27.1064 16.9643 27.1064 24.4492C27.1064 31.934 21.0378 38.002 13.5527 38.002C6.06779 38.0018 9.32922e-05 31.9339 0 24.4492C0 16.9645 6.06773 10.8967 13.5527 10.8965ZM13.5527 14.751C8.19654 14.7512 3.85449 19.0932 3.85449 24.4492C3.85459 29.8052 8.1966 34.1473 13.5527 34.1475C18.909 34.1475 23.2519 29.8053 23.252 24.4492C23.252 19.0931 18.9091 14.751 13.5527 14.751Z" fill="url(#paint0_linear_2573_7562)"/>
                <defs>
                    <linearGradient id="paint0_linear_2573_7562" x1="0.581431" y1="12.4085" x2="24.7052" y2="31.2751" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#FF4000"/>
                        <stop offset="1" stop-color="#FE784B"/>
                    </linearGradient>
                </defs>
            </g>
        </svg>`;

        function generateFavicons() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            const blob = new Blob([svg], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            
            img.onload = function() {
                const sizes = [16, 32, 48, 180, 192, 512];
                const downloads = document.getElementById('downloads');
                downloads.innerHTML = '<h3>Download these files and place them in the public folder:</h3>';
                
                sizes.forEach(size => {
                    canvas.width = size;
                    canvas.height = size;
                    ctx.clearRect(0, 0, size, size);
                    ctx.drawImage(img, 0, 0, size, size);
                    
                    canvas.toBlob(function(blob) {
                        const link = document.createElement('a');
                        link.download = size === 180 ? 'apple-touch-icon.png' : 
                                       size === 192 ? 'android-chrome-192x192.png' :
                                       size === 512 ? 'android-chrome-512x512.png' :
                                       `favicon-${size}x${size}.png`;
                        link.href = URL.createObjectURL(blob);
                        link.textContent = `Download ${link.download}`;
                        downloads.appendChild(link);
                        downloads.appendChild(document.createElement('br'));
                    });
                });
                
                URL.revokeObjectURL(url);
            };
            
            img.src = url;
        }
    </script>
</body>
</html>
